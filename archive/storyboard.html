<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ═══════════════════════════════════════════════
// API Client — talks to server.py
// ═══════════════════════════════════════════════
const API = 'http://127.0.0.1:18765/api';

async function apiGet(path) {
  const r = await fetch(`${API}${path}`);
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}
async function apiPut(path, data) {
  const r = await fetch(`${API}${path}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}
async function apiPost(path, data) {
  const r = await fetch(`${API}${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}
async function apiDelete(path) {
  const r = await fetch(`${API}${path}`, { method:'DELETE' });
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}
async function apiUploadBlobs(files) {
  const fd = new FormData();
  files.forEach((f, i) => fd.append(`file${i}`, f, f.name || 'image.png'));
  const r = await fetch(`${API}/blobs`, { method:'POST', body: fd });
  if (!r.ok) throw new Error(`Upload failed`);
  return r.json(); // [{blobId, filename, size, contentType}]
}
async function apiGetBlob(blobId) {
  const r = await fetch(`${API}/blob/${blobId}`);
  if (!r.ok) return null;
  return r.blob();
}

// Blob converter: upload local blobs → replace with blobId in JSON
async function uploadShotBlobs(shot) {
  const updated = { ...shot };
  if (updated.variants) {
    const newVariants = [];
    for (const v of updated.variants) {
      const nv = { ...v };
      if (nv.imageBlob instanceof Blob) {
        const [info] = await apiUploadBlobs([nv.imageBlob]);
        nv.imageBlobId = info.blobId;
        delete nv.imageBlob;
      }
      newVariants.push(nv);
    }
    updated.variants = newVariants;
  }
  return updated;
}
async function uploadSeqBlobs(seq) {
  const updated = { ...seq };
  if (updated.videoSegments) {
    const newSegs = [];
    for (const seg of updated.videoSegments) {
      const ns = { ...seg };
      if (ns.videoBlob instanceof Blob) {
        const [info] = await apiUploadBlobs([ns.videoBlob]);
        ns.videoBlobId = info.blobId;
        delete ns.videoBlob;
      }
      newSegs.push(ns);
    }
    updated.videoSegments = newSegs;
  }
  return updated;
}

// Blob downloader: fetch blobId → create local Blob for display
async function restoreShotBlobs(shot) {
  const updated = { ...shot };
  if (updated.variants) {
    const newVariants = [];
    for (const v of updated.variants) {
      const nv = { ...v };
      if (nv.imageBlobId && !nv.imageBlob) {
        nv.imageBlob = await apiGetBlob(nv.imageBlobId);
      } else if (!nv.imageBlobId && nv.imageBlob) {
        // Already has blob (freshly uploaded), keep it
      }
      newVariants.push(nv);
    }
    updated.variants = newVariants;
  }
  return updated;
}
async function restoreSeqBlobs(seq) {
  const updated = { ...seq };
  if (updated.videoSegments) {
    const newSegs = [];
    for (const seg of updated.videoSegments) {
      const ns = { ...seg };
      if (ns.videoBlobId && !ns.videoBlob) {
        ns.videoBlob = await apiGetBlob(ns.videoBlobId);
      }
      newSegs.push(ns);
    }
    updated.videoSegments = newSegs;
  }
  return updated;
}

// ═══════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

// Time utilities — supports MM:SS and HH:MM:SS
function parseTimeToSeconds(str) {
  if (!str || !str.trim()) return null;
  const cleaned = str.trim();
  // HH:MM:SS
  const hms = cleaned.match(/^(\d{1,2}):(\d{1,2}):(\d{2})$/);
  if (hms) {
    const h = parseInt(hms[1]), m = parseInt(hms[2]), s = parseInt(hms[3]);
    if (m > 59 || s > 59) return null;
    return h * 3600 + m * 60 + s;
  }
  // MM:SS
  const ms = cleaned.match(/^(\d{1,2}):(\d{2})$/);
  if (ms) {
    const m = parseInt(ms[1]), s = parseInt(ms[2]);
    if (s > 59) return null;
    return m * 60 + s;
  }
  // Pure number → treat as total seconds
  const num = parseInt(cleaned);
  if (!isNaN(num) && num >= 0) return num;
  return null;
}
function formatSeconds(sec) {
  if (sec === null || sec === undefined) return '';
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function formatDurationHuman(sec) {
  if (sec === null || sec === undefined) return '';
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${h}h ${m}m ${s}s`;
  }
  if (sec >= 60) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }
  return `${sec}s`;
}
function autoFormatTimecode(raw) {
  // Strip non-digit, non-colon chars
  let val = raw.replace(/[^0-9:]/g, '');
  // Remove duplicate colons
  val = val.replace(/:+/g, ':');
  // Max 8 chars (HH:MM:SS)
  val = val.slice(0, 8);
  return val;
}
function validateTimecode(str) {
  if (!str || !str.trim()) return null; // empty is ok
  return parseTimeToSeconds(str) !== null;
}
function calcDurationSeconds(start, end) {
  const a = parseTimeToSeconds(start), b = parseTimeToSeconds(end);
  if (a === null || b === null || b < a) return null;
  return b - a;
}

// Keep old functions for backward compat
function fmtTime(sec) { return formatSeconds(sec); }
function parseTime(str) { return parseTimeToSeconds(str); }
function calcDuration(start, end) { return calcDurationSeconds(start, end); }
function blobToDataUrl(blob) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}

// ═══════════════════════════════════════════════
// Toast Context
// ═══════════════════════════════════════════════
const ToastCtx = createContext();
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg) => {
    const id = uid();
    setToasts(t => [...t, { id, msg }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 items-center pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className="toast-enter bg-indigo-500 text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-lg pointer-events-auto">{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function useToast() { return useContext(ToastCtx); }

// ═══════════════════════════════════════════════
// TagInput Component
// ═══════════════════════════════════════════════
function TagInput({ tags, onChange }) {
  const [input, setInput] = useState('');
  const add = useCallback((raw) => {
    const tag = raw.trim();
    if (tag && !tags.includes(tag)) onChange([...tags, tag]);
    setInput('');
  }, [tags, onChange]);
  const remove = useCallback((tag) => onChange(tags.filter(t => t !== tag)), [tags, onChange]);
  return (
    <div className="flex flex-wrap items-center gap-1.5">
      {tags.map(t => (
        <span key={t} className="inline-flex items-center gap-1 px-2 py-0.5 bg-indigo-500/20 text-indigo-300 rounded text-xs">
          {t}
          <button className="hover:text-red-400 ml-0.5" onClick={() => remove(t)}>&times;</button>
        </span>
      ))}
      <input
        className="bg-transparent border border-[#333455] rounded px-2 py-1 text-xs text-[#e8e8f0] w-24 focus:outline-none focus:border-indigo-500 placeholder-[#555]"
        placeholder="添加标签..."
        value={input}
        onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); add(input); } else if (e.key === 'Backspace' && !input && tags.length) { remove(tags[tags.length-1]); } }}
        onChange={e => setInput(e.target.value)}
        onBlur={() => { if (input.trim()) add(input); }}
      />
    </div>
  );
}

// ═══════════════════════════════════════════════
// PresetTags Component (replaces TagInput - fixed options)
// ═══════════════════════════════════════════════
const PRESET_TAGS = {
  scene:  { label:'场景', opts: ['Interior','Exterior','Day','Night'] },
  shot:   { label:'镜头', opts: ['Wide Shot','Medium Shot','Close-up','Extreme CU'] },
  motion: { label:'运动', opts: ['Static','Slow Motion','Pan','Tracking'] },
};
function PresetTags({ tags, onChange }) {
  const [open, setOpen] = useState(false);
  const toggle = (tag) => {
    const next = tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag];
    onChange(next);
  };
  const activeCount = (tags || []).length;
  return (
    <div className="relative" onMouseLeave={() => setOpen(false)}>
      <button className={`text-xs px-2 py-1 rounded transition-colors flex items-center gap-1 max-w-[200px]
        ${activeCount ? 'bg-indigo-500/15 text-indigo-300 border border-indigo-500/20' : 'text-[#555] hover:text-[#888] border border-transparent hover:border-[#2a2b48]'}`}
        onClick={() => setOpen(!open)}>
        <span>🏷</span>
        {activeCount > 0 ? (
          <span className="text-[10px] truncate">{(tags || []).join(', ')}</span>
        ) : (
          <span className="text-[10px] opacity-50">标签</span>
        )}
        <span className="text-[10px] ml-1 opacity-50 shrink-0">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="absolute bottom-full left-0 mb-2 bg-[#181830] border border-[#2a2b48] rounded-xl p-3 shadow-2xl z-50 w-80"
          onClick={e => e.stopPropagation()}>
          {Object.entries(PRESET_TAGS).map(([key, group]) => (
            <div key={key} className="mb-2 last:mb-0">
              <div className="text-[10px] text-[#555] uppercase tracking-wider mb-1.5">{group.label}</div>
              <div className="flex flex-wrap gap-1">
                {group.opts.map(opt => {
                  const active = (tags || []).includes(opt);
                  return (
                    <button key={opt}
                      className={`text-[10px] px-2 py-1 rounded-full transition-colors
                        ${active ? 'bg-indigo-500 text-white' : 'bg-[#111122] text-[#666] hover:text-[#aaa] hover:bg-[#1a1a32]'}`}
                      onClick={() => toggle(opt)}>
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// SequenceTabs Component
// ═══════════════════════════════════════════════
function SequenceTabs({ sequences, activeSeqId, onSelect, onCreate, onRename, onDelete, shotsBySeq }) {
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const toast = useToast();

  const startRename = (s) => { setEditingId(s.id); setEditName(s.name); };
  const confirmRename = (id) => {
    const name = editName.trim();
    if (!name) { toast('序列名称不能为空'); return; }
    onRename(id, name);
    setEditingId(null);
  };
  return (
    <div className="flex items-center gap-1 px-4 py-2 bg-[#0d0d1a] border-b border-[#1e1e3a] overflow-x-auto">
      {/* All tab */}
      <button
        className={`shrink-0 text-xs px-3 py-1.5 rounded-lg transition-colors
          ${!activeSeqId ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'text-[#666] hover:text-[#aaa] border border-transparent hover:border-[#2a2b48]'}`}
        onClick={() => onSelect(null)}>全部</button>
      <span className="text-[#333] mx-1">|</span>
      {sequences.map(s => {
        const count = (shotsBySeq[s.id] || []).length;
        const active = s.id === activeSeqId;
        return (
          <div key={s.id} className={`shrink-0 group flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg cursor-pointer transition-colors
            ${active ? 'bg-indigo-500/15 text-indigo-300 border border-indigo-500/30' : 'text-[#777] hover:text-[#aaa] border border-transparent hover:border-[#2a2b48]'}`}
            onClick={() => onSelect(s.id)}
            onDoubleClick={() => startRename(s)}>
            {editingId === s.id ? (
              <input className="bg-[#111122] border border-indigo-500 rounded px-1 py-0 text-xs text-[#e8e8f0] outline-none w-20"
                value={editName} onChange={e => setEditName(e.target.value)}
                onBlur={() => confirmRename(s.id)}
                onKeyDown={e => { if (e.key==='Enter') confirmRename(s.id); if (e.key==='Escape') setEditingId(null); }}
                autoFocus onClick={e => e.stopPropagation()} />
            ) : (
              <span>{s.name}</span>
            )}
            <span className="text-[10px] text-[#555]">({count})</span>
            <span className="hidden group-hover:flex items-center ml-1 gap-0.5">
              <button className="text-[#555] hover:text-[#aaa]" onClick={e=>{e.stopPropagation();startRename(s);}}>✎</button>
              <button className="text-[#555] hover:text-red-400" onClick={e=>{e.stopPropagation();if(confirm('删除序列及其中所有分镜？'))onDelete(s.id);}}>✕</button>
            </span>
          </div>
        );
      })}
      <button className="shrink-0 text-[#555] hover:text-indigo-400 text-lg px-2 transition-colors" onClick={()=>{
        const name = prompt('新建序列名称：');
        if (name && name.trim()) onCreate(name.trim());
      }} title="新建序列">+</button>
    </div>
  );
}

// ═══════════════════════════════════════════════
// TimecodeInput Component
// ═══════════════════════════════════════════════
function TimecodeInput({ value, onChange, placeholder, hasError }) {
  const [focused, setFocused] = useState(false);
  const display = focused ? value : (value || placeholder || '00:00');
  const isValid = !value || validateTimecode(value);

  return (
    <input
      className={`bg-[#111122] border rounded px-2 py-1 text-[#ccc] w-20 text-center font-mono text-xs focus:outline-none transition-colors
        ${hasError ? 'border-red-500/50 focus:border-red-400' : isValid ? 'border-[#2a2b48] focus:border-indigo-500' : 'border-yellow-500/50 focus:border-yellow-400'}`}
      placeholder={placeholder || '00:00'}
      value={focused ? value : (value || '')}
      onFocus={() => setFocused(true)}
      onBlur={() => {
        setFocused(false);
        if (!value || !value.trim()) return;
        const parsed = parseTimeToSeconds(value);
        if (parsed !== null) {
          const formatted = formatSeconds(parsed);
          if (formatted !== value) onChange(formatted);
        }
      }}
      onChange={e => {
        const cleaned = autoFormatTimecode(e.target.value);
        onChange(cleaned);
      }}
    />
  );
}

// ═══════════════════════════════════════════════
// Lightbox Component
// ═══════════════════════════════════════════════
function Lightbox({ imageBlob, title, onClose }) {
  const url = useMemo(() => imageBlob ? URL.createObjectURL(imageBlob) : null, [imageBlob]);
  useEffect(() => { return () => { if (url) URL.revokeObjectURL(url); }; }, [url]);
  if (!imageBlob) return null;
  return (
    <div className="fixed inset-0 z-[998] bg-black/90 flex items-center justify-center cursor-zoom-out" onClick={onClose}>
      <span className="absolute top-5 right-6 text-3xl text-white opacity-70 hover:opacity-100 cursor-pointer">&times;</span>
      <img src={url} className="max-w-[92vw] max-h-[92vh] rounded-lg shadow-2xl" alt={title || ''} />
    </div>
  );
}

// Compare mode: primary vs user-selected variant
function LightboxCompare({ variants, primaryId, altId, onSwitch, onClose }) {
  const primary = variants.find(v => v.id === primaryId);
  const alt = variants.find(v => v.id === altId);
  const otherAlts = variants.filter(v => v.id !== primaryId && v.id !== altId);
  const urlA = useMemo(() => primary?.imageBlob ? URL.createObjectURL(primary.imageBlob) : null, [primary]);
  const urlB = useMemo(() => alt?.imageBlob ? URL.createObjectURL(alt.imageBlob) : null, [alt]);
  useEffect(() => { return () => { if (urlA) URL.revokeObjectURL(urlA); if (urlB) URL.revokeObjectURL(urlB); }; }, [urlA, urlB]);
  // ESC to exit
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);

  if (!primary || !alt) return null;

  return (
    <div className="fixed inset-0 z-[998] compare-overlay flex flex-col items-center justify-center"
      style={{ background: 'rgba(8,8,20,0.72)' }}>

      {/* Click-through background — dismiss */}
      <div className="absolute inset-0" onClick={onClose} />

      {/* Floating top bar */}
      <div className="relative z-10 flex items-center gap-4 mb-6 px-5 py-2.5 rounded-full"
        style={{ background: 'rgba(255,255,255,0.04)', backdropFilter: 'blur(8px)', boxShadow: '0 1px 0 rgba(255,255,255,0.05) inset' }}
        onClick={e => e.stopPropagation()}>
        <span className="text-xs text-indigo-300/90 font-medium">{primary.label}</span>
        <span className="text-[10px] text-[#555] tracking-wider">vs</span>
        <span className="text-xs text-[#999] font-medium">{alt.label}</span>
        {otherAlts.length > 0 && (
          <>
            <span className="w-px h-4 bg-white/[0.08]" />
            {otherAlts.map(a => (
              <button key={a.id}
                className="text-[10px] px-2 py-1 rounded-full text-[#666] hover:text-[#ccc] hover:bg-white/[0.08] transition-all"

// ═══════════════════════════════════════════════
// VariantGallery Component
// ═══════════════════════════════════════════════
function VariantGallery({ variants, onUpdate, onLightbox, onCompare, shotId }) {
  const [dragOver, setDragOver] = useState(false);
  const [comparePick, setComparePick] = useState(false); // selector visible for 3+ variants
  const primary = variants.find(v => v.isPrimary) || variants[0];
  const otherVariants = variants.filter(v => v.id !== primary?.id);

  const handleCompareClick = (e) => {
    e.stopPropagation();
    if (otherVariants.length === 1) {
      // 2 variants total: direct compare — the only allowed auto case
      onCompare(otherVariants[0].id);
    } else if (otherVariants.length >= 2) {
      // 3+ variants: show selector
      setComparePick(true);
    }
  };

  // Find next available letter not used by any variant's permanent letter
  const nextLetter = useCallback((allVariants) => {
    const used = new Set(allVariants.map(v => v.letter));
    for (let i = 0; i < 26; i++) {
      const l = `方案 ${String.fromCharCode(65 + i)}`;
      if (!used.has(l)) return l;
    }
    return `方案 ${allVariants.length}`;
  }, []);

  const addVariant = useCallback((files) => {
    const imgs = Array.from(files).filter(f => f.type.match(/^image\/(png|jpe?g|webp)$/));
    if (!imgs.length) return;
    const hasPrimary = variants.some(v => v.isPrimary);
    let tempVariants = [...variants];
    const newVariants = [];
    for (const f of imgs) {
      const isFirst = !hasPrimary && tempVariants.length === 0;
      const letter = nextLetter(tempVariants);
      const v = { id: uid(), imageBlob: f, label: isFirst ? '主方案' : letter, letter, isPrimary: isFirst, tags: {} };
      newVariants.push(v);
      tempVariants.push(v);
    }
    onUpdate([...variants, ...newVariants]);
  }, [variants, onUpdate, nextLetter]);

  const setPrimary = useCallback((id) => {
    onUpdate(variants.map(v => {
      if (v.id === id) {
        return { ...v, label: '主方案', isPrimary: true };
      }
      if (v.isPrimary) {
        return { ...v, label: v.letter || '方案 ?', isPrimary: false };
      }
      return v;
    }));
  }, [variants, onUpdate]);

  const updateLabel = useCallback((id, label) => {
    onUpdate(variants.map(v => v.id === id ? { ...v, label } : v));
  }, [variants, onUpdate]);

  const updateTags = useCallback((id, tags) => {
    onUpdate(variants.map(v => v.id === id ? { ...v, tags } : v));
  }, [variants, onUpdate]);

  const deleteVariant = useCallback((id) => {
    if (variants.length <= 1) return;
    const remaining = variants.filter(v => v.id !== id);
    if (!remaining.some(v => v.isPrimary)) {
      remaining[0] = { ...remaining[0], label: '主方案', isPrimary: true };
    }
    onUpdate(remaining);
  }, [variants, onUpdate]);

  const imgUrl = useCallback((blob) => blob ? URL.createObjectURL(blob) : null, []);

  return (
    <div
      className={`space-y-3 ${dragOver ? 'ring-2 ring-indigo-500 rounded-lg' : ''}`}
      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={e => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files.length) addVariant(e.dataTransfer.files); }}
    >
      {/* Primary image */}
      {primary && (
        <div className="relative rounded-lg overflow-hidden bg-[#111122] border border-[#2a2b48] cursor-pointer group/img"
          style={{ aspectRatio: '16/9' }}
          onClick={() => onLightbox(primary.imageBlob, primary.label)}>
          <img src={imgUrl(primary.imageBlob)} className="w-full h-full object-cover group-hover/img:opacity-80 transition-opacity" alt="" />
          <span className="absolute top-2 left-2 bg-indigo-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">
            {primary.label || '主方案'}
          </span>
          {otherVariants.length >= 1 && (
            <button className="absolute top-2 right-2 bg-black/50 hover:bg-black/70 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover/img:opacity-100 transition-opacity"
              onClick={handleCompareClick}>
              对比 →
            </button>
          )}
          {/* Compare picker: overlay for 3+ variants */}
          {comparePick && (
            <div className="absolute inset-0 z-20 bg-black/80 flex flex-col items-center justify-center gap-2 rounded-lg"
              onClick={e => e.stopPropagation()}>
              <span className="text-[10px] text-[#888] mb-1">选择对比对象</span>
              {otherVariants.map(v => (
                <button key={v.id} className="text-[10px] px-3 py-1.5 bg-[#1a1b32] hover:bg-indigo-500/30 text-[#ccc] hover:text-white rounded-lg transition-colors"
                  onClick={e => { e.stopPropagation(); setComparePick(false); onCompare(v.id); }}>
                  {v.label}
                </button>
              ))}
              <button className="text-[10px] text-[#555] hover:text-[#aaa] mt-1"
                onClick={e => { e.stopPropagation(); setComparePick(false); }}>取消</button>
            </div>
          )}
        </div>
      )}

      {/* Variant thumbnails row */}
      <div className="flex gap-2 overflow-x-auto pb-1">
        {variants.map((v, i) => {
          const isPrimary = v.isPrimary;
          return (
            <div key={v.id} className={`relative shrink-0 w-24 rounded-lg overflow-hidden border-2 transition-colors group/var
              ${isPrimary ? 'border-indigo-400' : 'border-transparent hover:border-[#3d3e64]'}`}>
              <div className="aspect-video bg-[#111122] cursor-pointer" onClick={() => onLightbox(v.imageBlob, v.label)}>
                <img src={imgUrl(v.imageBlob)} className="w-full h-full object-cover" alt="" />
              </div>
              {/* Hover actions */}
              <div className="absolute inset-0 bg-black/60 opacity-0 group-hover/var:opacity-100 transition-opacity flex flex-col items-center justify-center gap-1 p-1">
                <input
                  className="bg-transparent text-[10px] text-white text-center w-full outline-none border-b border-white/20 focus:border-white/50"
                  value={v.label}
                  onChange={e => updateLabel(v.id, e.target.value)}
                  onClick={e => e.stopPropagation()}
                />
                {!isPrimary && (
                  <>
                    <button className="text-[10px] text-yellow-400 hover:text-yellow-300"
                      onClick={e => { e.stopPropagation(); setPrimary(v.id); }}>☆ 设为主图</button>
                    <button className="text-[10px] text-red-400 hover:text-red-300"
                      onClick={e => { e.stopPropagation(); deleteVariant(v.id); }}>✕ 删除</button>
                  </>
                )}
              </div>
              {isPrimary && <span className="absolute bottom-1 left-1 text-[9px] text-indigo-300 font-bold">主</span>}
              <span className="absolute top-1 right-1 text-[9px] text-white/60">{String.fromCharCode(65 + i)}</span>
            </div>
          );
        })}
        {/* Add button */}
        <label className="shrink-0 w-24 aspect-video rounded-lg border-2 border-dashed border-[#2a2b48] hover:border-indigo-500/50 flex flex-col items-center justify-center cursor-pointer transition-colors group/add"
          onMouseEnter={() => { pasteTargetRef.current = { type: 'variant', shotId }; }}
          onMouseLeave={() => { pasteTargetRef.current = null; }}>
          <span className="text-2xl text-[#333] group-hover/add:text-[#666] transition-colors">+</span>
          <span className="text-[9px] text-[#444] group-hover/add:text-[#666] transition-colors mt-0.5">Ctrl+V</span>
          <input type="file" accept="image/png,image/jpeg,image/webp" className="hidden"
            onChange={e => { if (e.target.files.length) { addVariant(e.target.files); e.target.value = ''; } }} />
        </label>
      </div>

      {/* Variant tags editor removed — not needed for current workflow */}
    </div>
  );
}

// ShotCard Component (v3)
// ═══════════════════════════════════════════════
function ShotCard({ shot, globalNum, onChange, onDelete }) {
  const [lightboxImg, setLightboxImg] = useState(null);
  const [compareMode, setCompareMode] = useState(null); // { altId } or null
  const variants = shot.variants || [];

  const durationSec = useMemo(() => calcDurationSeconds(shot.startTime, shot.endTime), [shot.startTime, shot.endTime]);
  const endTimeError = useMemo(() => {
    const a = parseTimeToSeconds(shot.startTime), b = parseTimeToSeconds(shot.endTime);
    if (a !== null && b !== null && b < a) return true;
    return false;
  }, [shot.startTime, shot.endTime]);

  const field = (key) => (val) => onChange({ ...shot, [key]: val });
  const updateVariants = (v) => onChange({ ...shot, variants: v });
  const updateTime = (key) => (val) => {
    const updated = { ...shot, [key]: val };
    const d = calcDurationSeconds(updated.startTime, updated.endTime);
    if (d !== null) updated.duration = formatDurationHuman(d);
    onChange(updated);
  };

  return (
    <div id={`shot-${shot.id}`}
      className="bg-[#1a1b32] border border-[#2a2b48] rounded-xl overflow-hidden hover:border-[#3d3e64] transition-colors group">
      {/* header */}
      <div className="flex items-center gap-2.5 px-4 py-2.5 border-b border-white/5">
        <span className="bg-indigo-500 text-white text-xs font-bold px-2.5 py-1 rounded-full">Shot {globalNum || '?'}</span>
        {durationSec !== null && (
          <span className="text-xs text-indigo-400 font-mono ml-1">⏱ {formatDurationHuman(durationSec)}</span>
        )}
        <span className="text-xs text-[#555] ml-auto">
          {(shot.startTime || '--:--')} → {(shot.endTime || '--:--')}
        </span>
        <span className="text-xs text-[#444]">{variants.length > 1 ? `${variants.length} 方案` : ''}</span>
        <button className="text-[#555] hover:text-red-400 text-sm px-1.5 py-0.5 rounded transition-colors opacity-0 group-hover:opacity-100"
          onClick={onDelete} title="删除">✕</button>
      </div>

      {/* body */}
      <div className="flex gap-4 p-4">
        <div className="shrink-0 w-[260px]">
          <VariantGallery
            variants={variants}
            onUpdate={updateVariants}
            onLightbox={(blob, label) => setLightboxImg({ blob, label })}
            onCompare={(altId) => setCompareMode({ altId })}
            shotId={shot.id}
          />
        </div>

        <div className="flex-1 flex flex-col gap-3 min-w-0">
          <input
            className="bg-transparent text-base font-semibold text-[#e8e8f0] outline-none placeholder-[#444] border-b border-transparent focus:border-indigo-500 pb-1 transition-colors"
            placeholder="分镜标题（如：开场镜头）"
            value={shot.title}
            onChange={e => field('title')(e.target.value)}
          />
          <textarea
            className="flex-1 bg-[#111122] border border-[#2a2b48] rounded-lg p-3 text-sm text-[#ccc] outline-none resize-none focus:border-indigo-500 transition-colors placeholder-[#444] min-h-[80px]"
            placeholder="分镜描述、旁白文案、镜头说明..."
            value={shot.description}
            onChange={e => field('description')(e.target.value)}
          />

          {/* time row with TimecodeInput */}
          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex items-center gap-1.5">
              <span className="text-xs text-[#888] w-8">开始</span>
              <TimecodeInput value={shot.startTime} onChange={updateTime('startTime')} placeholder="00:00" />
            </div>
            <span className="text-[#444] text-xs">→</span>
            <div className="flex items-center gap-1.5">
              <span className="text-xs text-[#888] w-8">结束</span>
              <TimecodeInput value={shot.endTime} onChange={updateTime('endTime')} placeholder="00:00" hasError={endTimeError} />
            </div>
            {durationSec !== null && (
              <span className="text-xs text-indigo-400 font-mono font-semibold">{formatDurationHuman(durationSec)}</span>
            )}
            {endTimeError && (
              <span className="text-xs text-red-400">结束时间不能小于开始时间</span>
            )}
          </div>

          {/* tags */}
          <PresetTags tags={shot.tags || []} onChange={tags => onChange({ ...shot, tags })} />
        </div>
      </div>

      {/* Lightbox / Compare */}
      {lightboxImg && <Lightbox imageBlob={lightboxImg.blob} title={lightboxImg.label} onClose={() => setLightboxImg(null)} />}
      {compareMode && (
        <LightboxCompare
          variants={variants}
          primaryId={variants.find(v => v.isPrimary)?.id || variants[0]?.id}
          altId={compareMode.altId}
          onSwitch={(newAltId) => setCompareMode({ altId: newAltId })}
          onClose={() => setCompareMode(null)}
        />
      )}
    </div>
  );
}

}

// ═══════════════════════════════════════════════
// ShotBoard Component
// ═══════════════════════════════════════════════
// Paste target: ref shared across components to track hover target for Ctrl+V
const pasteTargetRef = { current: null }; // { type: 'variant', shotId } | { type: 'new-shot' } | null

function ShotBoard({ project, shots, shotGlobalNum, onChangeShot, onDeleteShot, onAddImages, onAddImagesToShot, navigatorRef, activeSeqId }) {
  const scrollRef = useRef(null);

  // Expose scroll container ref for Timeline
  useEffect(() => { if (navigatorRef) navigatorRef.current = scrollRef.current; }, [navigatorRef, shots]);

  // Ctrl+V paste listener — uses hover target for destination
  useEffect(() => {
    const handler = (e) => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;
      const items = e.clipboardData?.items;
      if (!items) return;
      const files = [];
      for (const item of items) {
        if (item.type.startsWith('image/')) files.push(item.getAsFile());
      }
      if (!files.length) return;
      e.preventDefault();
      const target = pasteTargetRef.current;
      if (target?.type === 'variant' && target.shotId && onAddImagesToShot) {
        onAddImagesToShot(target.shotId, files);
      } else {
        onAddImages(files);
      }
    };
    document.addEventListener('paste', handler);
    return () => document.removeEventListener('paste', handler);
  }, [onAddImages, onAddImagesToShot]);

  if (!project) {
    return (
      <div className="flex-1 flex items-center justify-center">
        <div className="text-center">
          <div className="text-5xl mb-4 opacity-30">📂</div>
          <div className="text-lg text-[#666] mb-1">未选择项目</div>
          <div className="text-sm text-[#555]">在左侧创建或选择一个项目开始创作</div>
        </div>
      </div>
    );
  }

  return (
    <div ref={scrollRef} className="flex-1 overflow-y-auto p-6">
      {!activeSeqId ? (
        /* All Sequences view: no shot creation allowed */
        shots.length === 0 ? (
          <div className="text-center py-16">
            <div className="text-5xl mb-4 opacity-30">📂</div>
            <div className="text-sm text-[#888] mb-1">选择一个序列以查看和管理分镜</div>
            <div className="text-xs text-[#555]">在上方标签栏点击序列名称进入详情</div>
          </div>
        ) : (
          <div className="max-w-4xl mx-auto space-y-4 pb-16">
            {shots.map((shot, i) => (
              <ShotCard
                key={shot.id}
                shot={shot}
                globalNum={shotGlobalNum[shot.id]}
                onChange={onChangeShot}
                onDelete={() => onDeleteShot(shot.id)}
              />
            ))}
          </div>
        )
      ) : (
        /* Sequence Detail view: allow shot creation */
        shots.length === 0 ? (
          <DropZone onFiles={onAddImages} message="拖拽或粘贴 AI 生成的分镜图片到这里" />
        ) : (
          <div className="max-w-4xl mx-auto space-y-4 pb-16">
            {shots.map((shot, i) => (
              <ShotCard
                key={shot.id}
                shot={shot}
                globalNum={shotGlobalNum[shot.id]}
                onChange={onChangeShot}
                onDelete={() => onDeleteShot(shot.id)}
              />
            ))}
            <DropZone onFiles={onAddImages} message="继续添加分镜..." />
          </div>
        )
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// Timeline Component (v4: drag reorder + sequence grouping)
// ═══════════════════════════════════════════════
function Timeline({ shots, sequences, activeSeqId, scrollContainerRef, onReorderShots, shotGlobalNum }) {
  const [collapsed, setCollapsed] = useState(false);
  const [activeShotId, setActiveShotId] = useState(null);
  const [dragShotId, setDragShotId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);     // hover target during drag
  const [insertPos, setInsertPos] = useState('before');    // 'before' | 'after'
  const [landedId, setLandedId] = useState(null);          // just-dropped item for animation
  const [collapsedSeqs, setCollapsedSeqs] = useState({});
  const visibleEntriesRef = useRef({});
  const suppressObserverRef = useRef(false);
  const scrollEndTimerRef = useRef(null);

  // Reset highlight when visible shots change (sequence switch, search, etc.)
  useEffect(() => {
    setActiveShotId(null);
    visibleEntriesRef.current = {};
  }, [shots]);

  // Stable IntersectionObserver: pick the first visible shot (closest to top)
  useEffect(() => {
    const container = scrollContainerRef?.current;
    if (!container || !shots.length) return;
    const handle = () => {
      if (suppressObserverRef.current) return; // blocked during programmatic scroll
      const entries = Object.values(visibleEntriesRef.current);
      // Pick the shot with largest visible area (intersectionRatio)
      let best = null;
      let bestRatio = 0;
      for (const entry of entries) {
        if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
          bestRatio = entry.intersectionRatio;
          best = entry;
        }
      }
      if (best) {
        const id = best.target.dataset.shotId;
        setActiveShotId(prev => prev === id ? prev : id);
      }
    };
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        visibleEntriesRef.current[entry.target.dataset.shotId || ''] = entry;
      }
      handle();
    }, { root: container, threshold: [0, 0.25, 0.5, 0.75, 1] });
    shots.forEach((s) => {
      const el = document.getElementById(`shot-${s.id}`);
      if (el) { el.dataset.shotId = s.id; observer.observe(el); }
    });
    // Listen for scroll end to release the suppression lock
    const onScrollEnd = () => {
      suppressObserverRef.current = false;
      handle(); // update highlight to the final scroll position
    };
    container.addEventListener('scrollend', onScrollEnd);
    return () => {
      observer.disconnect();
      container.removeEventListener('scrollend', onScrollEnd);
    };
  }, [shots, scrollContainerRef]);

  const jumpTo = useCallback((id) => {
    // 1. Lock observer
    suppressObserverRef.current = true;
    // 2. Set highlight immediately
    setActiveShotId(id);
    // 3. Scroll (observer blocked during smooth animation)
    requestAnimationFrame(() => {
      const el = document.getElementById(`shot-${id}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // Fallback: if scrollend isn't supported, release lock after 600ms
        clearTimeout(scrollEndTimerRef.current);
        scrollEndTimerRef.current = setTimeout(() => {
          suppressObserverRef.current = false;
        }, 600);
      } else {
        suppressObserverRef.current = false;
      }
    });
  }, []);

  const toggleSeq = (sid) => setCollapsedSeqs(prev => ({ ...prev, [sid]: !prev[sid] }));

  if (!shots.length) return null;

  if (collapsed) {
    return (
      <div className="w-8 bg-[#12122a] border-l border-[#1e1e3a] flex items-center justify-center cursor-pointer hover:bg-[#1a1a32] transition-colors shrink-0"
        onClick={() => setCollapsed(false)} title="展开时间轴">
        <span className="text-xs text-[#555]" style={{writingMode:'vertical-rl'}}>时间轴</span>
      </div>
    );
  }

  // Group shots by sequence
  const seqMap = {};
  sequences.forEach(s => { seqMap[s.id] = s; });
  const groups = [];
  if (!activeSeqId) {
    const bySeq = {};
    shots.forEach(s => {
      const sid = s.sequenceId || '__none__';
      if (!bySeq[sid]) bySeq[sid] = [];
      bySeq[sid].push(s);
    });
    for (const [sid, shts] of Object.entries(bySeq)) {
      const seq = seqMap[sid];
      groups.push({ seq, seqId: sid, shots: shts });
    }
    groups.sort((a, b) => {
      const ao = a.seq ? a.seq.orderIndex : 999;
      const bo = b.seq ? b.seq.orderIndex : 999;
      return ao - bo;
    });
  } else {
    groups.push({ seq: seqMap[activeSeqId], seqId: activeSeqId, shots });
  }

  // Drag: visual feedback handlers
  const clearDragState = () => {
    setDragShotId(null);
    setDragOverId(null);
    setInsertPos('before');
  };
  const handleDragStart = (shotId) => {
    setDragShotId(shotId);
    setDragOverId(null);
  };
  const handleDragOver = (shotId, e) => {
    e.preventDefault();
    if (shotId === dragShotId) { setDragOverId(null); return; }
    // Determine insert position: top half = before, bottom half = after
    const rect = e.currentTarget.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    setInsertPos(e.clientY < mid ? 'before' : 'after');
    setDragOverId(shotId);
  };
  const handleDragLeave = () => {
    setDragOverId(null);
  };
  const handleDrop = (targetShotId) => {
    if (dragShotId && dragShotId !== targetShotId) {
      const src = shots.find(s => s.id === dragShotId);
      const tgt = shots.find(s => s.id === targetShotId);
      if (src && tgt && src.sequenceId === tgt.sequenceId) {
        onReorderShots(dragShotId, targetShotId);
        setLandedId(dragShotId);
        setTimeout(() => setLandedId(null), 600);
      }
    }
    clearDragState();
  };
  const handleDragEnd = () => {
    clearDragState();
  };

  return (
    <div className="w-48 bg-[#12122a] border-l border-[#1e1e3a] flex flex-col h-full shrink-0 overflow-hidden">
      <div className="flex items-center justify-between px-3 py-2.5 border-b border-[#1e1e3a]">
        <span className="text-xs text-[#666] font-semibold">时间轴</span>
        <button className="text-[#555] hover:text-[#aaa] text-xs transition-colors"
          onClick={() => setCollapsed(true)} title="收起">◀</button>
      </div>
      <div className="flex-1 overflow-y-auto px-2 py-2 space-y-0.5">
        {groups.map(group => {
          const seq = group.seq;
          const isCollapsed = collapsedSeqs[group.seqId];
          return (
            <div key={group.seqId} className="mb-1">
              {/* Sequence group header */}
              {!activeSeqId && seq && (
                <div className="flex items-center gap-1 px-2 py-1.5 cursor-pointer hover:bg-white/[0.03] rounded text-xs"
                  onClick={() => toggleSeq(group.seqId)}>
                  <span className="text-[10px]">{isCollapsed ? '▶' : '▼'}</span>
                  <span className="text-[#aaa] font-medium truncate flex-1">{seq.name}</span>
                  <span className="text-[10px] text-[#555]">{group.shots.length}</span>
                </div>
              )}
              {!activeSeqId && seq && isCollapsed ? null : (
                group.shots.map((s, localIdx) => {
                  const primary = s.variants?.find(v => v.isPrimary) || s.variants?.[0];
                  const isActive = s.id === activeShotId;
                  const isDragging = s.id === dragShotId;
                  const isDragOver = s.id === dragOverId;
                  const isLanded = s.id === landedId;
                  const showInsertBefore = isDragOver && insertPos === 'before';
                  const showInsertAfter = isDragOver && insertPos === 'after';
                  return (
                    <div key={s.id}
                      className={`relative flex items-center gap-2 px-2 py-1.5 rounded-lg text-xs transition-all duration-200
                        ${isActive ? 'bg-indigo-500/15 border border-indigo-500/20' : 'hover:bg-white/[0.04] border border-transparent'}
                        ${isDragging ? 'tl-dragging' : ''}
                        ${isLanded ? 'tl-landed' : ''}
                        ${showInsertBefore ? 'tl-insert-line tl-insert-active' : ''}
                        ${showInsertAfter ? '' : ''}`}
                      style={{ cursor: isDragging ? 'grabbing' : 'pointer' }}
                      draggable
                      onDragStart={(e) => {
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', s.id);
                        // Custom drag image: semi-transparent clone
                        const ghost = e.currentTarget.cloneNode(true);
                        ghost.style.opacity = '0.6';
                        ghost.style.position = 'absolute';
                        ghost.style.top = '-9999px';
                        document.body.appendChild(ghost);
                        e.dataTransfer.setDragImage(ghost, 50, 20);
                        requestAnimationFrame(() => document.body.removeChild(ghost));
                        handleDragStart(s.id);
                      }}
                      onDragOver={(e) => handleDragOver(s.id, e)}
                      onDragLeave={handleDragLeave}
                      onDrop={(e) => { e.preventDefault(); handleDrop(s.id); }}
                      onDragEnd={handleDragEnd}
                      onClick={() => jumpTo(s.id)}>
                      {/* Insert line before this item */}
                      {showInsertBefore && (
                        <div className="absolute left-2 right-2 top-0 h-[3px] bg-[#a78bfa] rounded-sm z-10 pointer-events-none transition-all duration-150"
                          style={{ transform: 'translateY(-3px)', boxShadow: '0 0 6px rgba(124,111,247,0.4)', opacity: 1 }} />
                      )}
                      {/* Insert line after this item */}
                      {showInsertAfter && (
                        <div className="absolute left-2 right-2 bottom-0 h-[3px] bg-[#a78bfa] rounded-sm z-10 pointer-events-none transition-all duration-150"
                          style={{ transform: 'translateY(6px)', boxShadow: '0 0 6px rgba(124,111,247,0.4)', opacity: 1 }} />
                      )}
                      <span className={`shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold
                        ${isActive ? 'bg-indigo-500 text-white' : 'bg-[#1e1e3a] text-[#666]'}`}>
                        {shotGlobalNum?.[s.id] || localIdx + 1}
                      </span>
                      <div className="min-w-0 flex-1">
                        <div className="text-[#aaa] truncate">{s.title || `Shot ${shotGlobalNum?.[s.id] || localIdx + 1}`}</div>
                        <div className="text-[10px] text-[#555]">
                          {s.startTime || '--:--'}{s.duration ? ` · ${s.duration}` : ''}
                        </div>
                      </div>
                      {primary && (
                        <div className="w-10 h-6 rounded overflow-hidden shrink-0 bg-[#111122]">
                          <img src={URL.createObjectURL(primary.imageBlob)} className="w-full h-full object-cover" alt=""
                            onLoad={e => { setTimeout(() => URL.revokeObjectURL(e.target.src), 5000); }} />
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// VideoOutputPanel Component
// ═══════════════════════════════════════════════
function VideoOutputPanel({ sequence, onUpdate }) {
  const [collapsed, setCollapsed] = useState(false);
  const [expandedId, setExpandedId] = useState(null); // which segment is expanded
  const fileRef = useRef(null);
  const segments = sequence.videoSegments || [];

  const addSegment = useCallback((files) => {
    const videos = Array.from(files).filter(f => f.type.match(/^video\/(mp4|webm)$/));
    if (!videos.length) return;
    const newSegs = videos.map(v => ({
      id: uid(), videoBlob: v,
      name: v.name, format: v.type,
      duration: '', exportDate: new Date().toISOString(), versionNote: ''
    }));
    onUpdate({ ...sequence, videoSegments: [...segments, ...newSegs] });
  }, [sequence, segments, onUpdate]);

  const updateSegment = (segId, field) => (e) => {
    onUpdate({
      ...sequence,
      videoSegments: segments.map(s => s.id === segId ? { ...s, [field]: e.target.value } : s)
    });
  };

  const deleteSegment = (segId) => {
    onUpdate({ ...sequence, videoSegments: segments.filter(s => s.id !== segId) });
  };

  const setDuration = (segId, dur) => {
    onUpdate({
      ...sequence,
      videoSegments: segments.map(s => s.id === segId ? { ...s, duration: dur } : s)
    });
  };

  return (
    <div className="border-b border-[#1e1e3a] p-4">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-xs text-[#666] font-semibold uppercase tracking-wider">视频片段</span>
        <span className="text-[10px] text-[#555]">{segments.length ? `${segments.length} 个片段` : '未导入'}</span>
        <div className="flex-1" />
        <input ref={fileRef} type="file" accept="video/mp4,video/webm" multiple className="hidden"
          onChange={e => { if (e.target.files.length) { addSegment(e.target.files); e.target.value = ''; } }} />
        <button className="text-[10px] px-2 py-1 text-[#888] hover:text-indigo-400 hover:bg-white/[0.04] rounded transition-all"
          onClick={() => fileRef.current?.click()}>+ 添加片段</button>
        <button className="text-[#555] hover:text-[#aaa] text-xs transition-colors"
          onClick={() => setCollapsed(!collapsed)}>{collapsed ? '展开 ▼' : '收起 ▲'}</button>
      </div>

      {!collapsed && segments.length === 0 && (
        <div
          className="border-2 border-dashed border-[#2a2b48] hover:border-indigo-500/50 rounded-xl p-8 text-center cursor-pointer transition-all"
          onDragOver={e => { e.preventDefault(); }}
          onDrop={e => { e.preventDefault(); addSegment(e.dataTransfer.files); }}
          onClick={() => fileRef.current?.click()}
        >
          <div className="text-3xl mb-2 opacity-40">🎥</div>
          <div className="text-sm text-[#888]">导入视频片段</div>
          <div className="text-xs text-[#555] mt-1">拖拽 MP4/WebM 到此处 或 点击上传</div>
        </div>
      )}

      {!collapsed && segments.map((seg, i) => {
        const isExpanded = expandedId === seg.id;
        const url = seg.videoBlob ? URL.createObjectURL(seg.videoBlob) : null;
        return (
          <div key={seg.id} className={`mt-3 ${i > 0 ? 'border-t border-white/[0.04] pt-3' : ''}`}>
            {/* Segment header */}
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setExpandedId(isExpanded ? null : seg.id)}>
              <span className="text-[10px] text-[#555]">{isExpanded ? '▼' : '▶'}</span>
              <span className="text-xs text-[#aaa] truncate flex-1">{seg.name || `片段 ${i + 1}`}</span>
              <span className="text-[10px] text-[#555]">{seg.duration || '--:--'}</span>
              <button className="text-[10px] text-[#555] hover:text-red-400 transition-colors"
                onClick={e => { e.stopPropagation(); deleteSegment(seg.id); }}>✕</button>
            </div>

            {/* Expanded detail */}
            {isExpanded && (
              <div className="flex gap-4 mt-2">
                <div className="shrink-0 w-[200px]">
                  {url && (
                    <video src={url} controls className="w-full rounded-lg bg-black"
                      onLoadedMetadata={e => {
                        const d = Math.round(e.target.duration);
                        if (d && !seg.duration) setDuration(seg.id, formatDurationHuman(d));
                      }} />
                  )}
                </div>
                <div className="flex-1 flex flex-col gap-2 text-xs">
                  <div className="flex items-center gap-2">
                    <span className="text-[#666] w-12">名称</span>
                    <input className="flex-1 bg-[#111122] border border-[#2a2b48] rounded px-2 py-1 text-[#ccc] outline-none focus:border-indigo-500"
                      value={seg.name || ''} onChange={updateSegment(seg.id, 'name')} />
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[#666] w-12">格式</span>
                    <span className="text-[#888]">{seg.format || '--'}</span>
                    <span className="text-[#666] ml-4 w-12">时长</span>
                    <span className="text-[#888]">{seg.duration || '--'}</span>
                  </div>
                  <div className="flex items-start gap-2">
                    <span className="text-[#666] w-12 shrink-0 pt-1">备注</span>
                    <textarea className="flex-1 bg-[#111122] border border-[#2a2b48] rounded px-2 py-1 text-[#ccc] outline-none focus:border-indigo-500 resize-none h-10"
                      placeholder="版本备注..." value={seg.versionNote || ''} onChange={updateSegment(seg.id, 'versionNote')} />
                  </div>
                  <span className="text-[10px] text-[#555]">{seg.exportDate ? new Date(seg.exportDate).toLocaleString('zh-CN') : ''}</span>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ProjectSidebar Component (renamed from Sidebar)
// ═══════════════════════════════════════════════
function ProjectSidebar({ projects, activeId, onSelect, onCreate, onRename, onDelete }) {
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const toast = useToast();

  const startRename = (p) => { setEditingId(p.id); setEditName(p.name); };
  const confirmRename = (id) => {
    const name = editName.trim();
    if (!name) { toast('项目名称不能为空'); return; }
    onRename(id, name);
    setEditingId(null);
  };
  const handleDelete = (p) => {
    if (!confirm(`确定删除项目「${p.name}」及其所有分镜？此操作不可恢复。`)) return;
    onDelete(p.id);
  };
  const handleCreate = () => {
    const name = prompt('请输入项目名称：');
    if (name && name.trim()) onCreate(name.trim());
  };

  return (
    <div className="w-64 bg-[#12122a] border-r border-[#1e1e3a] flex flex-col h-full shrink-0">
      {/* logo */}
      <div className="px-5 py-4 border-b border-[#1e1e3a]">
        <h1 className="text-base font-bold text-[#e8e8f0] tracking-wide">🎬 分镜脚本</h1>
        <p className="text-xs text-[#555] mt-0.5">AI Video Storyboard</p>
      </div>

      {/* project list */}
      <div className="flex-1 overflow-y-auto px-3 py-3 space-y-1">
        <div className="flex items-center justify-between px-2 mb-2">
          <span className="text-xs text-[#666] font-semibold uppercase tracking-wider">项目</span>
          <button className="text-indigo-400 text-lg leading-none hover:text-indigo-300 transition-colors" onClick={handleCreate} title="新建项目">+</button>
        </div>
        {projects.map(p => (
          <div key={p.id}
            className={`group flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition-colors text-sm
              ${activeId === p.id ? 'bg-indigo-500/15 text-indigo-300 border border-indigo-500/30' : 'hover:bg-white/[0.04] text-[#aaa] border border-transparent'}`}
            onClick={() => onSelect(p.id)}
            onDoubleClick={() => startRename(p)}
          >
            <span className="text-xs shrink-0">{activeId === p.id ? '📁' : '📂'}</span>
            {editingId === p.id ? (
              <input
                className="flex-1 bg-[#1a1b32] border border-indigo-500 rounded px-1.5 py-0.5 text-xs text-[#e8e8f0] outline-none min-w-0"
                value={editName}
                onChange={e => setEditName(e.target.value)}
                onBlur={() => confirmRename(p.id)}
                onKeyDown={e => { if (e.key === 'Enter') confirmRename(p.id); if (e.key === 'Escape') setEditingId(null); }}
                autoFocus
                onClick={e => e.stopPropagation()}
              />
            ) : (
              <span className="flex-1 truncate">{p.name}</span>
            )}
            <div className="hidden group-hover:flex items-center gap-0.5 shrink-0">
              <button className="text-[#555] hover:text-[#aaa] text-xs px-1"
                onClick={e => { e.stopPropagation(); startRename(p); }} title="重命名">✎</button>
              <button className="text-[#555] hover:text-red-400 text-xs px-1"
                onClick={e => { e.stopPropagation(); handleDelete(p); }} title="删除">✕</button>
            </div>
          </div>
        ))}
        {projects.length === 0 && (
          <div className="text-xs text-[#555] text-center py-6">暂无项目，点击 + 创建</div>
        )}
      </div>

      {/* footer */}
      <div className="px-5 py-3 border-t border-[#1e1e3a] text-xs text-[#555]">
        {projects.length} 个项目
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// App Root Component
// ═══════════════════════════════════════════════
function App() {
  const [projects, setProjects] = useState([]);
  const [sequences, setSequences] = useState([]);
  const [shots, setShots] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [activeSeqId, setActiveSeqId] = useState(null); // null = "all"
  const [loaded, setLoaded] = useState(false);
  const navigatorRef = useRef(null);
  const toast = useToast();

  // Load from server
  useEffect(() => {
    (async () => {
      try {
        const [projs, seqs, shts, meta] = await Promise.all([
          apiGet('/projects'),
          apiGet('/sequences'),
          apiGet('/shots'),
          apiGet('/meta')
        ]);
        // Sort sequences and shots by orderIndex
        seqs.sort((a, b) => (a.orderIndex ?? 0) - (b.orderIndex ?? 0));
        shts.sort((a, b) => (a.orderIndex ?? 0) - (b.orderIndex ?? 0));
        // Restore blobs
        const restoredShots = await Promise.all(shts.map(s => restoreShotBlobs(s)));
        const restoredSeqs = await Promise.all(seqs.map(s => restoreSeqBlobs(s)));
        // Ensure defaults
        setProjects(projs.map(p => ({ aiConfig: {}, ...p })));
        setSequences(restoredSeqs.map(s => ({ videoSegments: [], ...s })));
        setShots(restoredShots.map(s => {
          const v = (s.variants || []).map((v, i) => ({ letter: `方案 ${String.fromCharCode(65 + i)}`, ...v }));
          return { variants: [], metadata: {}, tags: [], ...s, variants: v };
        }));
        const activeProjectId = meta?.activeProjectId;
        if (activeProjectId && projs.find(p => p.id === activeProjectId)) setActiveId(activeProjectId);
        else if (projs.length) setActiveId(projs[0].id);
        console.log('Loaded:', { projects: projs.length, sequences: seqs.length, shots: shts.length, activeId: activeProjectId });
      } catch(e) {
        console.log('Server not running or no data yet:', e.message);
      }
      setLoaded(true);
    })();
  }, []);

  // Persist active project
  useEffect(() => { if (activeId && loaded) apiPut(`/meta/activeProjectId`, { value: activeId }).catch(()=>{}); }, [activeId, loaded]);

  // Auto-save shots (debounced) — upload blobs + PUT
  const saveShots = useCallback(debounce(async (s) => {
    for (const shot of s) {
      const cleaned = await uploadShotBlobs(shot);
      await apiPut(`/shots/${shot.id}`, cleaned).catch(() => apiPost('/shots', cleaned));
    }
  }, 600), []);
  const saveSequences = useCallback(debounce(async (s) => {
    for (const seq of s) {
      const cleaned = await uploadSeqBlobs(seq);
      await apiPut(`/sequences/${seq.id}`, cleaned).catch(() => apiPost('/sequences', cleaned));
    }
  }, 600), []);
  const saveProjects = useCallback(debounce(async (p) => {
    for (const proj of p) {
      await apiPut(`/projects/${proj.id}`, proj).catch(() => apiPost('/projects', proj));
    }
  }, 600), []);
  useEffect(() => { if (loaded) { saveShots(shots); saveSequences(sequences); } }, [shots, sequences, loaded]);
  useEffect(() => { if (loaded) saveProjects(projects); }, [projects, loaded]);

  // When switching projects, auto-select the first sequence
  useEffect(() => {
    const seqs = sequences.filter(s => s.projectId === activeId);
    setActiveSeqId(seqs.length > 0 ? seqs[0].id : null);
  }, [activeId]);

  const activeProject = useMemo(() => projects.find(p => p.id === activeId), [projects, activeId]);
  const projectSequences = useMemo(() => sequences.filter(s => s.projectId === activeId), [sequences, activeId]);
  const shotsBySeq = useMemo(() => {
    const map = {};
    shots.filter(s => s.projectId === activeId).forEach(s => {
      const sid = s.sequenceId || '__none__';
      if (!map[sid]) map[sid] = [];
      map[sid].push(s);
    });
    return map;
  }, [shots, activeId]);

  // Sorted list of all project shots (by sequence order, then shot orderIndex)
  const sortedProjectShots = useMemo(() => {
    const list = shots.filter(s => s.projectId === activeId);
    const seqOrder = {};
    projectSequences.forEach((s, i) => { seqOrder[s.id] = i; });
    list.sort((a, b) => {
      const sa = seqOrder[a.sequenceId] ?? 999;
      const sb = seqOrder[b.sequenceId] ?? 999;
      if (sa !== sb) return sa - sb;
      return (a.orderIndex ?? 0) - (b.orderIndex ?? 0);
    });
    return list;
  }, [shots, activeId, projectSequences]);

  // Global shot number map: shot.id → stable global position (1-based)
  const shotGlobalNum = useMemo(() => {
    const map = {};
    sortedProjectShots.forEach((s, i) => { map[s.id] = i + 1; });
    return map;
  }, [sortedProjectShots]);

  // Visible shots: filtered by active sequence + search
  const projectShots = useMemo(() => {
    return activeSeqId
      ? sortedProjectShots.filter(s => s.sequenceId === activeSeqId)
      : sortedProjectShots;
  }, [sortedProjectShots, activeSeqId]);

  // ── Project CRUD ──
  const createProject = useCallback((name) => {
    const pid = uid();
    const p = { id: pid, name, createdAt: Date.now(), updatedAt: Date.now(), aiConfig: {} };
    const defaultSeq = { id: uid(), projectId: pid, name: '默认序列', description: '', startTime: '', endTime: '',
      coverBlob: null, videoSegments: [], orderIndex: 0, createdAt: Date.now() };
    setProjects(prev => [...prev, p]);
    setSequences(prev => [...prev, defaultSeq]);
    setActiveId(pid);
  }, []);
  const renameProject = useCallback((id, name) => {
    setProjects(prev => prev.map(p => p.id === id ? { ...p, name, updatedAt: Date.now() } : p));
  }, []);
  const deleteProject = useCallback((id) => {
    setProjects(prev => prev.filter(p => p.id !== id));
    setSequences(prev => prev.filter(s => s.projectId !== id));
    setShots(prev => prev.filter(s => s.projectId !== id));
    if (activeId === id) setActiveId(null);
    apiDelete(`/projects/${id}`).catch(()=>{});
  }, [activeId]);

  // ── Sequence CRUD ──
  const createSequence = useCallback((name) => {
    if (!activeId) return;
    const s = { id: uid(), projectId: activeId, name, description: '', startTime: '', endTime: '',
      coverBlob: null, videoSegments: [], orderIndex: sequences.filter(s=>s.projectId===activeId).length, createdAt: Date.now() };
    setSequences(prev => [...prev, s]);
    setActiveSeqId(s.id);
  }, [activeId, sequences]);
  const renameSequence = useCallback((id, name) => {
    setSequences(prev => prev.map(s => s.id === id ? { ...s, name } : s));
  }, []);
  const deleteSequence = useCallback((id) => {
    setSequences(prev => prev.filter(s => s.id !== id));
    setShots(prev => prev.filter(s => s.sequenceId !== id));
    if (activeSeqId === id) setActiveSeqId(null);
    apiDelete(`/sequences/${id}`).catch(()=>{});
  }, [activeSeqId]);
  const updateSeqVideo = useCallback((updatedSeq) => {
    setSequences(prev => prev.map(s => s.id === updatedSeq.id ? updatedSeq : s));
  }, []);

  // ── Shot CRUD ──
  const addImages = useCallback((files) => {
    if (!activeId) { toast('请先选择或创建项目'); return; }
    if (!activeSeqId) { toast('请先选择一个序列'); return; }
    const sid = activeSeqId;
    const baseIdx = shots.filter(s => s.projectId === activeId && s.sequenceId === sid).length;
    const newShots = files.map((f, i) => ({
      id: uid(), projectId: activeId, sequenceId: sid,
      title: '', description: '',
      variants: [{ id: uid(), imageBlob: f, label: '主方案', letter: '方案 A', isPrimary: true, tags: {} }],
      startTime: '', endTime: '', duration: '', tags: [], metadata: {},
      orderIndex: baseIdx + i, createdAt: Date.now()
    }));
    setShots(prev => [...prev, ...newShots]);
    toast(`已添加 ${files.length} 个分镜`);
  }, [activeId, activeSeqId, shots, toast]);

  const updateShot = useCallback((updated) => {
    setShots(prev => prev.map(s => s.id === updated.id ? updated : s));
  }, []);

  const addImagesToShot = useCallback((shotId, files) => {
    setShots(prev => prev.map(s => {
      if (s.id !== shotId) return s;
      const existing = s.variants || [];
      const newVariants = files.map((f, i) => ({
        id: uid(), imageBlob: f,
        label: `方案 ${String.fromCharCode(65 + existing.length + i)}`,
        isPrimary: false, tags: {}
      }));
      return { ...s, variants: [...existing, ...newVariants] };
    }));
    toast(`已添加 ${files.length} 张备选图`);
  }, [toast]);

  const deleteShot = useCallback((id) => {
    setShots(prev => {
      const target = prev.find(s => s.id === id);
      if (!target) return prev;
      const filtered = prev.filter(s => s.id !== id);
      // Re-index within same sequence
      const seqShots = filtered.filter(s => s.sequenceId === target.sequenceId && s.projectId === target.projectId);
      const otherShots = filtered.filter(s => !(s.sequenceId === target.sequenceId && s.projectId === target.projectId));
      seqShots.forEach((s, i) => s.orderIndex = i);
      return [...otherShots, ...seqShots];
    });
    apiDelete(`/shots/${id}`).catch(()=>{});
  }, []);

  const reorderShots = useCallback((fromShotId, toShotId) => {
    setShots(prev => {
      const fromIdx = prev.findIndex(s => s.id === fromShotId);
      const toIdx = prev.findIndex(s => s.id === toShotId);
      if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return prev;
      const src = prev[fromIdx];
      const tgt = prev[toIdx];
      // Only reorder within same sequence
      if (src.sequenceId !== tgt.sequenceId) return prev;
      // Filter shots belonging to the same sequence
      const seqShots = prev.filter(s => s.sequenceId === src.sequenceId && s.projectId === src.projectId);
      const otherShots = prev.filter(s => !(s.sequenceId === src.sequenceId && s.projectId === src.projectId));
      const seqFrom = seqShots.findIndex(s => s.id === fromShotId);
      const seqTo = seqShots.findIndex(s => s.id === toShotId);
      const [moved] = seqShots.splice(seqFrom, 1);
      seqShots.splice(seqTo, 0, moved);
      seqShots.forEach((s, i) => s.orderIndex = i);
      return [...otherShots, ...seqShots];
    });
  }, []);

  // ── Export ──
  const exportJSON = useCallback(async () => {
    if (!activeProject || !projectShots.length) { toast('没有可导出的内容'); return; }
    const data = {
      project: { name: activeProject.name, createdAt: activeProject.createdAt },
      exportedAt: new Date().toISOString(),
      sequences: projectSequences.map(seq => ({ name: seq.name, description: seq.description })),
      shots: await Promise.all(projectShots.map(async s => ({
        sequenceId: s.sequenceId,
        title: s.title,
        description: s.description,
        startTime: s.startTime,
        endTime: s.endTime,
        duration: s.duration,
        tags: s.tags,
        metadata: s.metadata,
        variants: await Promise.all((s.variants || []).map(async v => ({
          label: v.label,
          isPrimary: v.isPrimary,
          tags: v.tags,
          image: v.imageBlob ? await blobToDataUrl(v.imageBlob) : null
        })))
      })))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    saveAs(blob, `${activeProject.name}.json`);
    toast('JSON 已导出');
  }, [activeProject, projectSequences, projectShots, toast]);

  const exportMD = useCallback(async () => {
    if (!activeProject || !projectShots.length) { toast('没有可导出的内容'); return; }
    let md = `# ${activeProject.name}\n\n**导出时间**: ${new Date().toLocaleString('zh-CN')}\n\n---\n\n`;
    for (let i = 0; i < projectShots.length; i++) {
      const s = projectShots[i];
      md += `## 场景 ${i + 1}: ${s.title || '(无标题)'}\n\n`;
      if (s.startTime) md += `- **时间**: ${s.startTime} → ${s.endTime} (${s.duration})\n`;
      if (s.tags?.length) md += `- **标签**: ${s.tags.map(t => `\`${t}\``).join(' ')}\n`;
      if (s.metadata?.prompt) md += `- **Prompt**: \`${s.metadata.prompt}\`\n`;
      if (s.description) md += `\n${s.description}\n`;
      const primary = s.variants?.find(v => v.isPrimary) || s.variants?.[0];
      if (primary?.imageBlob) {
        const dataUrl = await blobToDataUrl(primary.imageBlob);
        md += `\n![场景${i + 1} - ${primary.label || '主方案'}](${dataUrl})\n`;
      }
      const alts = (s.variants || []).filter(v => !v.isPrimary);
      if (alts.length) {
        md += `\n**备选方案**: ${alts.map(v => v.label).join(', ')}\n`;
      }
      md += '\n---\n\n';
    }
    const blob = new Blob([md], { type: 'text/markdown' });
    saveAs(blob, `${activeProject.name}.md`);
    toast('Markdown 已导出');
  }, [activeProject, projectSequences, projectShots, toast]);

  const exportZIP = useCallback(async () => {
    if (!activeProject || !projectShots.length) { toast('没有可导出的内容'); return; }
    const zip = new JSZip();
    const folder = activeProject.name;
    for (let i = 0; i < projectShots.length; i++) {
      const s = projectShots[i];
      const prefix = `scene_${String(i+1).padStart(3,'0')}`;
      // All variants
      (s.variants || []).forEach((v, vi) => {
        const ext = v.imageBlob?.type === 'image/png' ? 'png' : v.imageBlob?.type === 'image/webp' ? 'webp' : 'jpg';
        const vlabel = v.isPrimary ? 'main' : `alt_${String.fromCharCode(97 + vi)}`;
        if (v.imageBlob) zip.file(`${folder}/${prefix}_${vlabel}.${ext}`, v.imageBlob);
      });
      if (s.description?.trim()) zip.file(`${folder}/${prefix}.txt`, s.description);
    }
    const manifest = projectShots.map((s, i) => ({
      scene: i + 1, title: s.title, startTime: s.startTime, endTime: s.endTime,
      duration: s.duration, tags: s.tags, metadata: s.metadata,
      variants: (s.variants || []).map(v => ({ label: v.label, isPrimary: v.isPrimary, tags: v.tags }))
    }));
    zip.file(`${folder}/manifest.json`, JSON.stringify(manifest, null, 2));
    // Include sequence-level videos
    projectSequences.forEach(seq => {
      (seq.videoSegments || []).forEach((seg, si) => {
        if (seg.videoBlob) {
          const ext = seg.format?.includes('webm') ? 'webm' : 'mp4';
          zip.file(`${folder}/seq_${seq.name}/video_${String(si+1).padStart(2,'0')}.${ext}`, seg.videoBlob);
        }
      });
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    saveAs(blob, `${folder}.zip`);
    toast(`已导出 ${projectShots.length} 个分镜`);
  }, [activeProject, projectSequences, projectShots, toast]);

  if (!loaded) {
    return <div className="h-screen flex items-center justify-center"><span className="text-[#555]">加载中...</span></div>;
  }

  return (
    <div className="flex h-screen">
      <ProjectSidebar
        projects={projects}
        activeId={activeId}
        onSelect={setActiveId}
        onCreate={createProject}
        onRename={renameProject}
        onDelete={deleteProject}
      />
      <div className="flex-1 flex flex-col min-w-0">
        {activeProject && (
          <SequenceTabs
            sequences={projectSequences}
            activeSeqId={activeSeqId}
            onSelect={setActiveSeqId}
            onCreate={createSequence}
            onRename={renameSequence}
            onDelete={deleteSequence}
            shotsBySeq={shotsBySeq}
          />
        )}
        {activeSeqId && (() => {
          const activeSeq = projectSequences.find(s => s.id === activeSeqId);
          return activeSeq ? (
            <VideoOutputPanel sequence={activeSeq} onUpdate={updateSeqVideo} />
          ) : null;
        })()}
        <Toolbar
          project={activeProject}
          onUpload={addImages}
          onExportJSON={exportJSON}
          onExportMD={exportMD}
          onExportZIP={exportZIP}
          shotCount={projectShots.length}
          activeSeqId={activeSeqId}
        />
        <ShotBoard
          project={activeProject}
          shots={projectShots}
          shotGlobalNum={shotGlobalNum}
          onChangeShot={updateShot}
          onDeleteShot={deleteShot}
          onAddImages={addImages}
          onAddImagesToShot={addImagesToShot}
          navigatorRef={navigatorRef}
          activeSeqId={activeSeqId}
        />
      </div>
      {activeProject && (
        <Timeline
          shots={projectShots}
          sequences={projectSequences}
          activeSeqId={activeSeqId}
          scrollContainerRef={navigatorRef}
          onReorderShots={reorderShots}
          shotGlobalNum={shotGlobalNum}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// Mount
// ═══════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
