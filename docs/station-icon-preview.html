<!DOCTYPE html><html><head><meta charset="UTF-8"><title>中转站图标方案</title><style>
body{font:14px -apple-system,sans-serif;padding:40px;background:#fcfbf9;color:#333}
h1{font-size:18px;margin-bottom:4px}
.sub{color:#999;margin-bottom:28px}
.row{display:flex;gap:24px;margin:16px 0;align-items:flex-end}
.box{border:1px solid #e8e5e0;border-radius:16px;padding:24px 20px;text-align:center;background:#fff;width:160px}
.box h3{font-size:11px;color:#888;margin-top:12px;margin-bottom:4px}
.box p{font-size:10px;color:#bbb;line-height:1.4}
svg{display:block;margin:0 auto}
.collapsed{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:1px solid #ddd;border-radius:10px 0 0 10px;background:#fff;width:32px}
.collapsed .count{font-size:9px;font-weight:600;color:#555}
</style></head><body>
<h1>中转站图标方案</h1><p class="sub">收起态 — 右侧边缘按钮 · 色块填充风格</p>

<div class="row">
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2" fill="#333"/><rect x="6" y="8" width="5" height="4" rx="1" fill="#fff"/><rect x="13" y="8" width="5" height="4" rx="1" fill="#fff"/><rect x="6" y="14" width="5" height="4" rx="1" fill="#fff" opacity=".5"/><rect x="13" y="14" width="5" height="4" rx="1" fill="#fff" opacity=".5"/></svg>
</div>
<h3>方案A · 深色托盘</h3><p>四格缩略图，深色底<br>白块代表已存素材</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" fill="#C4A050"/><rect x="6" y="7" width="12" height="3" rx="1" fill="#fff" opacity=".8"/><rect x="6" y="12" width="8" height="3" rx="1" fill="#fff" opacity=".5"/></svg>
</div>
<h3>方案B · 金色卡片</h3><p>主题金色底<br>白横条像卡片堆叠</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="17" rx="3" fill="#5a5a5a"/><rect x="6" y="8" width="12" height="10" rx="2" fill="#fff"/></svg>
</div>
<h3>方案C · 灰色底板</h3><p>深灰底上一张白卡<br>最简洁</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#333"/><rect x="8" y="8" width="8" height="3" rx="1" fill="#fff" opacity=".9"/><rect x="8" y="13" width="5" height="3" rx="1" fill="#fff" opacity=".4"/></svg>
</div>
<h3>方案D · 圆形黑底</h3><p>圆形更有辨识度<br>白条堆叠</p>
</div>
</div>

<div class="row">
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><path d="M3 5h18a2 2 0 012 2v12a2 2 0 01-2 2H3a2 2 0 01-2-2V7a2 2 0 012-2z" fill="#4a4a4a"/><path d="M3 5l9 7 9-7" fill="#333"/></svg>
</div>
<h3>方案E · 信封/文件夹</h3><p>折叠信封感<br>表示"收集"</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="2" fill="#444"/><circle cx="12" cy="10" r="3" fill="#fff"/><path d="M17 18a5 5 0 00-10 0" fill="#fff" opacity=".6"/></svg>
</div>
<h3>方案F · 人物剪影</h3><p>素材=角色<br>圆形头+半身上半身</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" fill="#333"/><rect x="5" y="6" width="6" height="6" rx="1.5" fill="#fff"/><rect x="13" y="6" width="6" height="6" rx="1.5" fill="#fff" opacity=".6"/><rect x="5" y="14" width="6" height="6" rx="1.5" fill="#fff" opacity=".4"/><rect x="13" y="14" width="6" height="6" rx="1.5" fill="#fff" opacity=".2"/></svg>
</div>
<h3>方案G · 四宫格</h3><p>越来越淡的方块<br>表示图库网格</p>
</div>
<div class="box">
<div class="collapsed">
<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#D6B36A"/><path d="M8 8l4 8 4-8z" fill="#fff"/></svg>
</div>
<h3>方案H · 金色三角</h3><p>播放/收集三角<br>金色主题色</p>
</div>
</div>

<h2 style="margin-top:32px;font-size:16px">收起态预览</h2>
<div class="row">
<div class="box" style="background:#f5f3ef;padding:40px 20px">
<div class="collapsed" style="margin:0 auto">
<svg width="20" height="20" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" fill="#333"/><rect x="6" y="7" width="12" height="3" rx="1" fill="#fff" opacity=".8"/><rect x="6" y="12" width="8" height="3" rx="1" fill="#fff" opacity=".5"/></svg>
<span class="count">3</span>
</div>
<span class="sub" style="display:block;margin-top:8px">推荐：方案B修改版<br>深色底+白横条+计数</span>
</div>
</div>
</body></html>
