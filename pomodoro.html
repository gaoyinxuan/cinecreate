<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 - Pomodoro Timer</title>
<style>
  :root {
    --bg: #1a1b2e;
    --card: #232440;
    --focus: #ff6b6b;
    --short-break: #4ecdc4;
    --long-break: #45b7d1;
    --text: #e8e8f0;
    --text-secondary: #8888a0;
    --ring-bg: #2a2b45;
    --btn-bg: #2e2f4a;
    --btn-hover: #3a3b58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    background: var(--card);
    border-radius: 24px;
    padding: 48px 40px 40px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--ring-bg);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 36px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.25s;
    font-family: inherit;
  }

  .tab.active {
    background: var(--btn-bg);
    color: var(--text);
  }

  .tab.focus.active { color: var(--focus); }
  .tab.short.active { color: var(--short-break); }
  .tab.long.active { color: var(--long-break); }

  .timer-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 32px;
  }

  svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 10;
  }

  .ring-progress {
    fill: none;
    stroke: var(--focus);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke 0.3s;
  }

  .ring-progress.short { stroke: var(--short-break); }
  .ring-progress.long { stroke: var(--long-break); }

  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 64px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1;
  }

  .status {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-primary {
    width: 140px;
    border-radius: 32px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    background: var(--focus);
    color: #fff;
    gap: 8px;
    font-family: inherit;
  }

  .btn-primary:hover { filter: brightness(1.1); transform: scale(1.03); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-primary.short-mode { background: var(--short-break); }
  .btn-primary.long-mode { background: var(--long-break); }

  .btn-icon {
    background: var(--btn-bg);
    color: var(--text);
  }
  .btn-icon:hover { background: var(--btn-hover); }
  .btn-icon:active { transform: scale(0.93); }

  .sessions {
    color: var(--text-secondary);
    font-size: 14px;
  }

  .sessions .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ring-bg);
    transition: all 0.3s;
  }

  .dot.done { background: var(--focus); transform: scale(1.1); }

  .settings-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: center;
  }

  .setting {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .setting label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .setting input {
    width: 64px;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid var(--ring-bg);
    background: var(--btn-bg);
    color: var(--text);
    text-align: center;
    font-size: 15px;
    font-family: inherit;
  }

  .setting input:focus {
    outline: none;
    border-color: var(--focus);
  }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab focus active" data-mode="focus" onclick="switchMode('focus')">专注</button>
    <button class="tab short" data-mode="short" onclick="switchMode('short')">短休息</button>
    <button class="tab long" data-mode="long" onclick="switchMode('long')">长休息</button>
  </div>

  <div class="timer-wrapper">
    <svg viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-progress" cx="140" cy="140" r="130"
              stroke-dasharray="816.8" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time">25:00</div>
      <div class="status">准备开始</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-icon" onclick="resetTimer()" title="重置">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.5 18A9 9 0 1 0 2 12"/>
      </svg>
    </button>
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">
      <span id="playIcon">▶</span> <span id="btnLabel">开始</span>
    </button>
    <button class="btn btn-icon" onclick="skipTimer()" title="跳过">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 12 22 21 10 12 10 13 2"/>
      </svg>
    </button>
  </div>

  <div class="sessions">
    <span>今日完成：<strong id="sessionCount">0</strong> 个番茄</span>
    <div class="dots" id="dots"></div>
  </div>

  <div class="settings-row">
    <div class="setting">
      <label>专注</label>
      <input type="number" id="focusMin" value="25" min="1" max="120" onchange="updateDurations()">
    </div>
    <div class="setting">
      <label>短休息</label>
      <input type="number" id="shortMin" value="5" min="1" max="60" onchange="updateDurations()">
    </div>
    <div class="setting">
      <label>长休息</label>
      <input type="number" id="longMin" value="15" min="1" max="60" onchange="updateDurations()">
    </div>
  </div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 130; // ~816.8

  let mode = 'focus'; // focus | short | long
  let durations = { focus: 25 * 60, short: 5 * 60, long: 15 * 60 };
  let remaining = durations.focus;
  let total = durations.focus;
  let running = false;
  let interval = null;
  let sessions = 0;

  const $time = document.querySelector('.time');
  const $status = document.querySelector('.status');
  const $ring = document.querySelector('.ring-progress');
  const $startBtn = document.getElementById('startBtn');
  const $playIcon = document.getElementById('playIcon');
  const $btnLabel = document.getElementById('btnLabel');
  const $sessionCount = document.getElementById('sessionCount');
  const $dots = document.getElementById('dots');
  const $tabs = document.querySelectorAll('.tab');

  function format(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateRing() {
    const offset = CIRCUMFERENCE * (1 - remaining / total);
    $ring.setAttribute('stroke-dashoffset', offset);
  }

  function updateDisplay() {
    $time.textContent = format(remaining);
    document.title = `${format(remaining)} - 番茄钟`;
  }

  function setButtonState(running) {
    if (running) {
      $playIcon.textContent = '⏸';
      $btnLabel.textContent = '暂停';
      $status.textContent = mode === 'focus' ? '专注中...' : mode === 'short' ? '休息中...' : '长休息中...';
    } else {
      $playIcon.textContent = '▶';
      $btnLabel.textContent = remaining < total ? '继续' : '开始';
      $status.textContent = remaining < total ? '已暂停' : '准备开始';
    }
  }

  function switchMode(newMode) {
    if (running) {
      if (!confirm('切换模式将重置计时，确定吗？')) return;
      pause();
    }
    mode = newMode;
    total = durations[mode];
    remaining = total;
    updateDisplay();
    updateRing();
    setButtonState(false);
    updateModeUI();
  }

  function updateModeUI() {
    $tabs.forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

    $ring.classList.remove('short', 'long');
    $startBtn.classList.remove('short-mode', 'long-mode');
    if (mode === 'short') { $ring.classList.add('short'); $startBtn.classList.add('short-mode'); }
    if (mode === 'long') { $ring.classList.add('long'); $startBtn.classList.add('long-mode'); }
  }

  function toggleTimer() {
    if (running) { pause(); } else { start(); }
  }

  function start() {
    if (remaining <= 0) {
      remaining = durations[mode];
      total = durations[mode];
      updateRing();
    }
    total = durations[mode];
    running = true;
    setButtonState(true);

    const endTime = Date.now() + remaining * 1000;

    interval = setInterval(() => {
      const now = Date.now();
      remaining = Math.max(0, Math.round((endTime - now) / 1000));
      updateDisplay();
      updateRing();

      if (remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;
        onTimerEnd();
      }
    }, 200);
  }

  function pause() {
    if (interval) { clearInterval(interval); interval = null; }
    running = false;
    setButtonState(false);
  }

  function resetTimer() {
    if (running) pause();
    remaining = durations[mode];
    total = durations[mode];
    updateDisplay();
    updateRing();
    setButtonState(false);
  }

  function skipTimer() {
    if (running) pause();
    remaining = 0;
    updateDisplay();
    updateRing();
    onTimerEnd();
  }

  function onTimerEnd() {
    playSound();

    if (mode === 'focus') {
      sessions++;
      $sessionCount.textContent = sessions;
      updateDots();
      notify('番茄钟', '🍅 专注时间结束！休息一下吧~');
      switchMode('short');
    } else {
      notify('番茄钟', mode === 'short' ? '休息结束，继续加油！' : '长休息结束，准备好开始新的番茄了吗？');
      switchMode('focus');
    }

    setButtonState(false);
  }

  function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.5);
    });
  }

  function notify(title, body) {
    if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: '🍅' });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(p => {
        if (p === 'granted') new Notification(title, { body, icon: '🍅' });
      });
    }
  }

  function updateDots() {
    $dots.innerHTML = '';
    for (let i = 0; i < Math.max(sessions, 8); i++) {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i < sessions ? ' done' : '');
      $dots.appendChild(dot);
    }
  }

  function updateDurations() {
    const fm = parseInt(document.getElementById('focusMin').value) || 25;
    const sm = parseInt(document.getElementById('shortMin').value) || 5;
    const lm = parseInt(document.getElementById('longMin').value) || 15;
    durations = { focus: fm * 60, short: sm * 60, long: lm * 60 };
    if (!running) {
      total = durations[mode];
      remaining = total;
      updateDisplay();
      updateRing();
    }
  }

  // init
  updateDisplay();
  updateRing();
  updateDots();
  updateModeUI();

  // request notification permission on first interaction
  document.addEventListener('click', () => {
    if (Notification.permission === 'default') Notification.requestPermission();
  }, { once: true });
</script>
</body>
</html>
